{% extends "base.html" %} {% block content %}
<div style="max-width: 500px; margin: 4rem auto">
  <div class="glass" style="padding: 2rem">
    <h2 style="text-align: center; margin-bottom: 2rem">Forgot Password</h2>
    <p style="color: #64748b; text-align: center; margin-bottom: 1.5rem">Enter your email and we will send instructions if the account exists.</p>
    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div style="margin-bottom: 1rem">
        <label class="text-muted">Email</label>
        <input type="email" name="email" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem">Send Instructions</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; color: #475569; font-size: 0.95rem;">
      Jika akun Anda dibuat dengan Google, gunakan tombol "Lanjutkan dengan Google" di halaman login.
    </p>
    <p style="text-align: center; margin-top: 1.5rem">
      Remembered your password?
      <a href="{{ url_for('auth.login') }}" style="color: var(--accent-color)">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
