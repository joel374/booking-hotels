{% extends 'admin/base_admin.html' %}

{% block title %}Settings{% endblock %}
{% block page_description %}Manage application settings and preferences.{% endblock %}

{% block content %}
<div class="grid-2" style="grid-template-columns: 1fr; gap: 2rem; max-width: 600px; margin: 0 auto;">
    <div class="form-card">
        <h3 style="margin-bottom: 1.5rem; color: var(--primary);">System Settings</h3>
        <form method="POST" action="{{ url_for('admin.settings_update') }}">
            <div class="input-group">
                <div>
                    <label for="theme">Theme</label>
                    <select id="theme" name="theme">
                        <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light Mode</option>
                        <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Dark Mode</option>
                    </select>
                </div>
                <div>
                    <label for="language">Language</label>
                    <select id="language" name="language">
                        <option value="en" {% if user.language == 'en' %}selected{% endif %}>English</option>
                        <option value="id" {% if user.language == 'id' %}selected{% endif %}>Bahasa Indonesia</option>
                    </select>
                </div>
                <div>
                    <label for="notification_preference">Notification Preference</label>
                    <select id="notification_preference" name="notification_preference">
                        <option value="all" {% if user.notification_preference == 'all' %}selected{% endif %}>All Notifications</option>
                        <option value="important" {% if user.notification_preference == 'important' %}selected{% endif %}>Important Only</option>
                        <option value="none" {% if user.notification_preference == 'none' %}selected{% endif %}>Mute All</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 2rem; text-align: right;">
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
