{% extends "base.html" %} {% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <h2>Login ke Antigravity Hotels</h2>
      <p>Masuk dengan email, nomor telepon, atau username untuk melanjutkan pemesanan hotel.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" autocomplete="off">
      <input type="text" name="username_fake" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;top:-9999px;" />
      <input type="password" name="password_fake" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;top:-9999px;" />
      <div class="form-group">
        <label class="form-label" for="identifier">Email / No. HP / Username</label>
        <input id="identifier" type="text" name="identifier" class="form-control" placeholder="contoh: nama@email.com / 081234567890 / username" required autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
      </div>

      <div class="form-group password-group">
        <div class="form-label-row">
          <label class="form-label" for="password">Password</label>
          <button type="button" class="password-toggle" id="togglePassword">Tampilkan</button>
        </div>
        <input id="password" type="password" name="password" class="form-control" placeholder="Masukkan password Anda" required autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
      </div>

      <div class="form-row remember-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember_me" />
          Ingat Saya
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" class="text-link">Lupa password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <div class="auth-divider"><span>ATAU</span></div>

    <a href="{{ url_for('auth.login_google') }}" class="btn btn-secondary btn-block google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
        <path d="M1 1h22v22H1z" fill="none" />
      </svg>
      Lanjutkan dengan Google
    </a>

    <p class="auth-footer">
      Belum punya akun? <a href="{{ url_for('auth.register') }}" class="text-link">Daftar di sini</a>
    </p>
  </div>
</div>

<script>
  const passwordInput = document.getElementById('password');
  const togglePassword = document.getElementById('togglePassword');
  if (togglePassword && passwordInput) {
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.textContent = type === 'password' ? 'Tampilkan' : 'Sembunyikan';
    });
  }
</script>
{% endblock %}
