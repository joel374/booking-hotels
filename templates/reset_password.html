{% extends "base.html" %} {% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <h2>Reset Password</h2>
      <p>
        Masukkan password baru untuk mengamankan akun Anda. Password harus
        minimal 8 karakter.
      </p>
    </div>

    <form
      method="POST"
      action="{{ url_for('auth.reset_password', token=token) }}"
      class="auth-form"
      autocomplete="off"
    >
      <div class="form-group password-group">
        <div class="form-label-row">
          <label class="form-label" for="new_password">Password Baru</label>
          <button type="button" class="password-toggle" id="toggleNewPassword">
            Tampilkan
          </button>
        </div>
        <input
          id="new_password"
          type="password"
          name="new_password"
          class="form-control"
          placeholder="Minimal 8 karakter"
          required
          autocomplete="off"
        />
      </div>

      <div class="form-group password-group">
        <div class="form-label-row">
          <label class="form-label" for="confirm_password"
            >Konfirmasi Password</label
          >
          <button
            type="button"
            class="password-toggle"
            id="toggleConfirmPassword"
          >
            Tampilkan
          </button>
        </div>
        <input
          id="confirm_password"
          type="password"
          name="confirm_password"
          class="form-control"
          placeholder="Ketik ulang password baru"
          required
          autocomplete="off"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Reset Password
      </button>
    </form>

    <p class="auth-footer">
      Ingat password Anda?
      <a href="{{ url_for('auth.login') }}" class="text-link">Login di sini</a>
    </p>
  </div>
</div>

<script>
  const newPasswordInput = document.getElementById("new_password");
  const toggleNewPassword = document.getElementById("toggleNewPassword");
  const confirmPasswordInput = document.getElementById("confirm_password");
  const toggleConfirmPassword = document.getElementById(
    "toggleConfirmPassword",
  );

  if (toggleNewPassword && newPasswordInput) {
    toggleNewPassword.addEventListener("click", function () {
      const type =
        newPasswordInput.getAttribute("type") === "password"
          ? "text"
          : "password";
      newPasswordInput.setAttribute("type", type);
      this.textContent = type === "password" ? "Tampilkan" : "Sembunyikan";
    });
  }

  if (toggleConfirmPassword && confirmPasswordInput) {
    toggleConfirmPassword.addEventListener("click", function () {
      const type =
        confirmPasswordInput.getAttribute("type") === "password"
          ? "text"
          : "password";
      confirmPasswordInput.setAttribute("type", type);
      this.textContent = type === "password" ? "Tampilkan" : "Sembunyikan";
    });
  }
</script>
{% endblock %}
