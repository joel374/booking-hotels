name: Auto Deploy to VPS (Self-Hosted Runner)

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy Application
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Rebuild and Restart Docker Containers
        run: |
          # The runner executes this directly inside the VPS!
          # We just need to copy the .env file if we keep it outside the git directory,
          # or assume it's already in the runner's work directory.
          
          # Takedown old containers
          docker compose down
          
          # Build and start new containers
          docker compose up -d --build
          
          # Cleanup unused docker images to save space
          docker image prune -f
